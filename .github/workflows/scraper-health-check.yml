name: Scraper Health Check

on:
  push:
    paths:
      - 'app/api/episode/utils.ts'
      - 'scripts/scraper-health-check.ts'
  schedule:
    - cron: '0 8 * * 1' # weekly Monday 8am UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Run scraper health checks
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bun scripts/scraper-health-check.ts
